<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>llm-collab Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root[data-theme="dark"]{--bg:#0d1117;--bg-raised:#161b22;--bg-hover:#1c2129;--surface:#161b22;--border:#30363d;--border-hover:#484f58;--text:#e6edf3;--text-secondary:#c9d1d9;--text-muted:#8b949e;--text-faint:#484f58;--accent:#bc8cff;--accent-dim:rgba(188,140,255,.15);--accent-glow:rgba(188,140,255,.4);--green:#3fb950;--green-dim:rgba(63,185,80,.15);--yellow:#d29922;--yellow-dim:rgba(210,153,34,.15);--red:#f85149;--red-dim:rgba(248,81,73,.15);--blue:#58a6ff;--badge-pending-bg:#30363d;--badge-pending-fg:#8b949e;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow-lg:0 8px 24px rgba(0,0,0,.4)}
    :root[data-theme="light"]{--bg:#f6f8fa;--bg-raised:#fff;--bg-hover:#f3f4f6;--surface:#fff;--border:#d0d7de;--border-hover:#afb8c1;--text:#1f2328;--text-secondary:#32383f;--text-muted:#656d76;--text-faint:#8b949e;--accent:#8250df;--accent-dim:rgba(130,80,223,.1);--accent-glow:rgba(130,80,223,.3);--green:#1a7f37;--green-dim:rgba(26,127,55,.1);--yellow:#9a6700;--yellow-dim:rgba(154,103,0,.1);--red:#cf222e;--red-dim:rgba(207,34,46,.1);--blue:#0969da;--badge-pending-bg:#eaeef2;--badge-pending-fg:#656d76;--shadow:0 1px 3px rgba(31,35,40,.1);--shadow-lg:0 8px 24px rgba(31,35,40,.15)}
    :root[data-theme="solarized"]{--bg:#002b36;--bg-raised:#073642;--bg-hover:#094150;--surface:#073642;--border:#586e75;--border-hover:#657b83;--text:#93a1a1;--text-secondary:#839496;--text-muted:#657b83;--text-faint:#586e75;--accent:#d33682;--accent-dim:rgba(211,54,130,.15);--accent-glow:rgba(211,54,130,.4);--green:#859900;--green-dim:rgba(133,153,0,.15);--yellow:#b58900;--yellow-dim:rgba(181,137,0,.15);--red:#dc322f;--red-dim:rgba(220,50,47,.15);--blue:#268bd2;--badge-pending-bg:#073642;--badge-pending-fg:#657b83;--shadow:0 1px 3px rgba(0,0,0,.4);--shadow-lg:0 8px 24px rgba(0,0,0,.5)}
    :root[data-theme="wacky"]{--bg:#1a0a2e;--bg-raised:#2d1b4e;--bg-hover:#3d2b5e;--surface:#2d1b4e;--border:#ff6ec7;--border-hover:#ffd700;--text:#00ff88;--text-secondary:#ff6ec7;--text-muted:#c77dff;--text-faint:#7b2fff;--accent:#ffd700;--accent-dim:rgba(255,215,0,.2);--accent-glow:rgba(255,215,0,.6);--green:#00ff88;--green-dim:rgba(0,255,136,.2);--yellow:#ff6ec7;--yellow-dim:rgba(255,110,199,.2);--red:#ff4444;--red-dim:rgba(255,68,68,.2);--blue:#00d4ff;--badge-pending-bg:#3d2b5e;--badge-pending-fg:#c77dff;--shadow:0 1px 3px rgba(255,110,199,.3);--shadow-lg:0 8px 24px rgba(127,47,255,.4)}
    :root[data-theme="midnight"]{--bg:#0b1021;--bg-raised:#131a2e;--bg-hover:#1a2340;--surface:#131a2e;--border:#2a3a5c;--border-hover:#3d5a8a;--text:#c8d6e5;--text-secondary:#8395a7;--text-muted:#576574;--text-faint:#3d4f6a;--accent:#54a0ff;--accent-dim:rgba(84,160,255,.15);--accent-glow:rgba(84,160,255,.4);--green:#1dd1a1;--green-dim:rgba(29,209,161,.15);--yellow:#feca57;--yellow-dim:rgba(254,202,87,.15);--red:#ff6b6b;--red-dim:rgba(255,107,107,.15);--blue:#48dbfb;--badge-pending-bg:#1a2340;--badge-pending-fg:#576574;--shadow:0 1px 3px rgba(0,0,0,.5);--shadow-lg:0 8px 24px rgba(0,0,0,.7)}
    :root[data-theme="pastel"]{--bg:#ffe0f0;--bg-raised:#d4f0ff;--bg-hover:#fff3c4;--surface:#d5ffd0;--border:#ffb3d9;--border-hover:#ff80bf;--text:#7b2d8e;--text-secondary:#c44dbb;--text-muted:#e080d0;--text-faint:#f0b0e0;--accent:#ff6ba6;--accent-dim:rgba(255,107,166,.25);--accent-glow:rgba(255,107,166,.5);--green:#5cd65c;--green-dim:rgba(92,214,92,.25);--yellow:#ffd24d;--yellow-dim:rgba(255,210,77,.25);--red:#ff6666;--red-dim:rgba(255,102,102,.25);--blue:#66b3ff;--badge-pending-bg:#fff3c4;--badge-pending-fg:#e080d0;--shadow:0 1px 4px rgba(255,107,166,.2);--shadow-lg:0 8px 24px rgba(255,107,166,.25)}
    :root[data-theme="crimson"]{--bg:#0a0a0a;--bg-raised:#1a0a0a;--bg-hover:#2a1010;--surface:#1a0a0a;--border:#3d1515;--border-hover:#5c1f1f;--text:#f0d0d0;--text-secondary:#d4a0a0;--text-muted:#8c5555;--text-faint:#5c2e2e;--accent:#e63946;--accent-dim:rgba(230,57,70,.18);--accent-glow:rgba(230,57,70,.5);--green:#4caf50;--green-dim:rgba(76,175,80,.18);--yellow:#d4a017;--yellow-dim:rgba(212,160,23,.18);--red:#ff1744;--red-dim:rgba(255,23,68,.18);--blue:#e05555;--badge-pending-bg:#2a1010;--badge-pending-fg:#8c5555;--shadow:0 1px 3px rgba(0,0,0,.6);--shadow-lg:0 8px 24px rgba(230,57,70,.2);--font-override:'Barlow Semi Condensed',sans-serif}
    :root[data-theme="fiice"]{--bg:#110a0e;--bg-raised:#1c0e14;--bg-hover:#281520;--surface:#1c0e14;--border:#601828;--border-hover:#ff2020;--text:#ede8f4;--text-secondary:#c8a8d8;--text-muted:#7850a0;--text-faint:#3d2458;--accent:#ff28c8;--accent-dim:rgba(255,40,200,.22);--accent-glow:rgba(255,40,200,.65);--green:#70b8e8;--green-dim:rgba(112,184,232,.18);--yellow:#e86030;--yellow-dim:rgba(232,96,48,.18);--red:#ff2020;--red-dim:rgba(255,32,32,.22);--blue:#90a0d0;--badge-pending-bg:#281520;--badge-pending-fg:#7850a0;--shadow:0 1px 3px rgba(0,0,0,.6);--shadow-lg:0 8px 24px rgba(220,20,20,.45)}
    :root[data-theme="sunset"]{--bg:#0e0b14;--bg-raised:#171228;--bg-hover:#221840;--surface:#171228;--border:#3d1840;--border-hover:#ff8020;--text:#fce8c0;--text-secondary:#f0b070;--text-muted:#8068a8;--text-faint:#4a3068;--accent:#ff3d78;--accent-dim:rgba(255,61,120,.2);--accent-glow:rgba(255,61,120,.55);--green:#ffb040;--green-dim:rgba(255,176,64,.2);--yellow:#ff8020;--yellow-dim:rgba(255,128,32,.2);--red:#e02840;--red-dim:rgba(224,40,64,.2);--blue:#6870b0;--badge-pending-bg:#221840;--badge-pending-fg:#8068a8;--shadow:0 1px 3px rgba(0,0,0,.6);--shadow-lg:0 8px 24px rgba(200,30,60,.3)}
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text-secondary);line-height:1.5;transition:background .4s,color .4s}
    :root[data-theme="crimson"] body,:root[data-theme="crimson"] *{font-family:var(--font-override)!important;font-weight:700}

    .app{display:flex;flex-direction:column;height:100vh}
    .header{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1.25rem;border-bottom:1px solid var(--border);background:var(--bg-raised);flex-shrink:0}
    .header h1{font-size:1.3rem;font-weight:700;color:var(--text);letter-spacing:-.02em}
    .header h1 span{font-weight:400;color:var(--text-muted)}
    .header-right{display:flex;align-items:center;gap:1rem}
    .theme-switcher{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:6px;position:relative;flex-wrap:nowrap;cursor:pointer;opacity:.35;transition:opacity .3s ease}
    .theme-switcher:hover,.theme-switcher.expanded{opacity:1}
    .theme-switcher:not(.expanded) .theme-btn:not(.active){max-width:0;padding-left:0;padding-right:0;overflow:hidden;opacity:0;pointer-events:none}
    .theme-btn{background:none;border:none;color:var(--text-muted);font-size:.7rem;padding:.25rem .5rem;cursor:pointer;transition:max-width .4s cubic-bezier(.34,1.56,.64,1),padding .4s cubic-bezier(.34,1.56,.64,1),opacity .2s ease,color .2s,background .2s;max-width:80px;opacity:1;overflow:hidden;white-space:nowrap}
    .theme-btn:hover{color:var(--text);background:var(--bg-hover)}
    .theme-btn.active{color:var(--accent);background:var(--accent-dim)}
    .poll-indicator{display:flex;align-items:center;gap:.4rem;color:var(--text-faint);font-size:.75rem;white-space:nowrap;transition:color .2s}
    .poll-indicator:hover{color:var(--text-secondary)}
    .poll-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
    .poll-dot.fetching{background:var(--yellow);animation:pulse-dot .6s ease-in-out infinite}

    .main{display:flex;flex:1;overflow:hidden}

    .sidebar{width:250px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-raised);overflow-x:hidden;transition:width .2s ease}
    .sidebar-title{font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;padding:.7rem .85rem .5rem;display:flex;align-items:center;gap:.3rem;cursor:pointer;user-select:none}
    .sidebar-title:hover{color:var(--accent)}
    .sidebar.d-partial{width:110px}
    .sidebar.d-partial .agent-grid{grid-template-columns:1fr}
    .sidebar.d-partial .agent-name,.sidebar.d-partial .agent-stats{display:none}
    .sidebar.d-hidden{width:32px;overflow:hidden}
    .sidebar.d-hidden .agent-grid{display:none}
    @keyframes agentSlideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-18px)}}
    .sidebar.d-collapsing .sidebar-title{animation:agentSlideOut .2s ease forwards}
    @keyframes agentCollapseIn{from{opacity:0;transform:rotate(180deg) translateX(12px)}to{opacity:1;transform:rotate(180deg)}}
    .sidebar.d-hidden .sidebar-title{writing-mode:vertical-rl;transform:rotate(180deg);justify-content:flex-end;padding:.75rem 0;width:32px;height:100%;letter-spacing:.1em;animation:agentCollapseIn .35s cubic-bezier(.34,1.2,.64,1) forwards}
    .agent-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;padding:0 .75rem .75rem;overflow-y:auto;overflow-x:hidden;min-height:270px;max-height:none}
    .agent-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem;display:flex;flex-direction:column;align-items:center;gap:.3rem;cursor:pointer;transition:all .2s;text-align:center}
    .agent-card:hover{border-color:var(--border-hover)}
    .agent-card.filter-active{border-color:var(--accent);box-shadow:0 0 8px var(--accent-glow)}
    .agent-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;position:relative}

    /* Avatar animations */
    /* Settled (normal) versions */
    @keyframes av-orbit{0%{box-shadow:0 -20px 0 3px var(--accent)}25%{box-shadow:20px 0 0 3px var(--accent)}50%{box-shadow:0 20px 0 3px var(--accent)}75%{box-shadow:-20px 0 0 3px var(--accent)}100%{box-shadow:0 -20px 0 3px var(--accent)}}
    @keyframes av-heartbeat{0%,100%{transform:scale(1)}10%{transform:scale(1.25)}20%{transform:scale(1)}30%{transform:scale(1.15)}40%{transform:scale(1)}}
    @keyframes av-ripple{0%{box-shadow:0 0 0 0 rgba(255,255,255,.6),0 0 0 0 rgba(255,255,255,.3)}70%{box-shadow:0 0 0 12px rgba(255,255,255,0),0 0 0 24px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0),0 0 0 0 rgba(255,255,255,0)}}
    @keyframes av-jello{0%,100%{transform:scale(1,1)}20%{transform:scale(1.25,.75)}35%{transform:scale(.75,1.25)}50%{transform:scale(1.15,.9)}65%{transform:scale(.95,1.05)}80%{transform:scale(1.05,.95)}}
    @keyframes av-strobe{0%,100%{filter:hue-rotate(0deg) brightness(1)}15%{filter:hue-rotate(90deg) brightness(1.4)}30%{filter:hue-rotate(180deg) brightness(1.2)}45%{filter:hue-rotate(270deg) brightness(1.5)}60%{filter:hue-rotate(45deg) brightness(1.3)}75%{filter:hue-rotate(135deg) brightness(1.1)}}
    @keyframes av-spinbounce{0%{transform:rotate(0deg) translateY(0)}25%{transform:rotate(180deg) translateY(-10px)}50%{transform:rotate(360deg) translateY(0)}65%{transform:rotate(360deg) translateY(-5px)}80%{transform:rotate(360deg) translateY(0)}100%{transform:rotate(360deg) translateY(0)}}
    @keyframes av-shake{0%,100%{transform:translateX(0)}10%{transform:translateX(-6px)}20%{transform:translateX(6px)}30%{transform:translateX(-5px)}40%{transform:translateX(5px)}50%{transform:translateX(-3px)}60%{transform:translateX(3px)}70%{transform:translateX(-8px) scale(1.1)}80%{transform:translateX(8px) scale(1.1)}90%{transform:translateX(0) scale(1.05)}}
    /* Wild (aggressive) versions — first 30% of duration */
    @keyframes av-orbit-w{0%{box-shadow:0 -28px 0 6px var(--accent),0 0 18px 4px var(--accent-glow)}25%{box-shadow:28px 0 0 6px var(--accent),0 0 18px 4px var(--accent-glow)}50%{box-shadow:0 28px 0 6px var(--accent),0 0 18px 4px var(--accent-glow)}75%{box-shadow:-28px 0 0 6px var(--accent),0 0 18px 4px var(--accent-glow)}100%{box-shadow:0 -28px 0 6px var(--accent),0 0 18px 4px var(--accent-glow)}}
    @keyframes av-heartbeat-w{0%,100%{transform:scale(1)}8%{transform:scale(1.55)}16%{transform:scale(.9)}24%{transform:scale(1.4)}32%{transform:scale(1)}}
    @keyframes av-ripple-w{0%{box-shadow:0 0 0 0 rgba(255,255,255,.9),0 0 0 0 rgba(255,255,255,.6),0 0 0 0 rgba(255,255,255,.3)}60%{box-shadow:0 0 0 10px rgba(255,255,255,0),0 0 0 20px rgba(255,255,255,0),0 0 0 32px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0),0 0 0 0 rgba(255,255,255,0),0 0 0 0 rgba(255,255,255,0)}}
    @keyframes av-jello-w{0%,100%{transform:scale(1,1)}15%{transform:scale(1.6,.5)}30%{transform:scale(.5,1.6)}45%{transform:scale(1.4,.7)}60%{transform:scale(.8,1.3)}75%{transform:scale(1.2,.85)}90%{transform:scale(.9,1.1)}}
    @keyframes av-strobe-w{0%{filter:hue-rotate(0deg) brightness(2)}16%{filter:hue-rotate(120deg) brightness(2.2)}33%{filter:hue-rotate(240deg) brightness(1.8)}50%{filter:hue-rotate(60deg) brightness(2.4)}66%{filter:hue-rotate(180deg) brightness(2)}83%{filter:hue-rotate(300deg) brightness(2.2)}100%{filter:hue-rotate(0deg) brightness(2)}}
    @keyframes av-spinbounce-w{0%{transform:rotate(0deg) translateY(0) scale(1)}20%{transform:rotate(144deg) translateY(-22px) scale(1.2)}40%{transform:rotate(288deg) translateY(0) scale(.9)}60%{transform:rotate(432deg) translateY(-14px) scale(1.15)}80%{transform:rotate(576deg) translateY(0) scale(.95)}100%{transform:rotate(720deg) translateY(0) scale(1)}}
    @keyframes av-shake-w{0%,100%{transform:translateX(0) scale(1)}10%{transform:translateX(-14px) scale(1.15)}20%{transform:translateX(14px) scale(.9)}30%{transform:translateX(-12px) scale(1.2)}40%{transform:translateX(12px) scale(.85)}50%{transform:translateX(-10px) rotate(-8deg)}60%{transform:translateX(10px) rotate(8deg)}70%{transform:translateX(-8px) scale(1.1)}80%{transform:translateX(8px) scale(1.1)}90%{transform:translateX(0) scale(1.05)}}

    .agent-avatar.av-0{animation:av-orbit .8s linear infinite}
    .agent-avatar.av-1{animation:av-heartbeat .6s ease-in-out infinite}
    .agent-avatar.av-2{animation:av-ripple 1.5s ease-out infinite}
    .agent-avatar.av-3{animation:av-jello .7s ease-in-out infinite}
    .agent-avatar.av-4{animation:av-strobe .5s linear infinite}
    .agent-avatar.av-5{animation:av-spinbounce 1s ease-in-out infinite}
    .agent-avatar.av-6{animation:av-shake .6s ease-in-out infinite}
    .agent-avatar.av-0w{animation:av-orbit-w .3s linear infinite}
    .agent-avatar.av-1w{animation:av-heartbeat-w .25s ease-in-out infinite}
    .agent-avatar.av-2w{animation:av-ripple-w .5s ease-out infinite}
    .agent-avatar.av-3w{animation:av-jello-w .25s ease-in-out infinite}
    .agent-avatar.av-4w{animation:av-strobe-w .18s linear infinite}
    .agent-avatar.av-5w{animation:av-spinbounce-w .4s ease-in-out infinite}
    .agent-avatar.av-6w{animation:av-shake-w .25s ease-in-out infinite}
    .agent-name{font-size:.68rem;font-weight:600;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
    .agent-stats{font-size:.6rem;color:var(--text-muted);display:flex;gap:.35rem;justify-content:center}
    .mini-dot{width:5px;height:5px;border-radius:50%;display:inline-block;vertical-align:middle}
    .mini-dot.done{background:var(--green)}.mini-dot.active{background:var(--accent)}

    .content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .panel-header{padding:.5rem 1rem;border-bottom:1px solid var(--border);background:var(--bg-raised);display:flex;align-items:center;gap:.5rem;flex-shrink:0}
    .panel-title{font-size:.78rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:.4rem}
    .panel-title .icon{font-size:1rem}
    .heading-count{font-size:.7rem;color:var(--text-faint);font-weight:400}
    .msg-count-btn{cursor:pointer;border-radius:4px;padding:0 4px}
    .msg-count-btn:hover{background:var(--accent-dim);color:var(--accent)}
    .msg-count-btn.active{color:var(--accent);background:var(--accent-dim)}
    .messages-panel{flex:1;overflow-y:auto;min-height:0}
    .msg-list{display:flex;flex-direction:column;gap:.35rem;padding:.5rem .75rem}
    .msg-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;display:flex;gap:.6rem;align-items:flex-start;font-size:.8rem;transition:border-color .2s}
    .msg-item:hover{border-color:var(--border-hover)}
    .msg-item.unread{border-left:3px solid var(--accent)}
    .msg-item.filtered-out{display:none}
    .msg-meta{flex-shrink:0;display:flex;flex-direction:column;gap:.1rem;min-width:80px}
    .msg-from{font-weight:600;color:var(--accent);font-size:.76rem}
    .msg-to{color:var(--text-faint);font-size:.66rem;transition:color .2s}
    .msg-item:hover .msg-to{color:var(--text-muted)}
    .msg-read-status{color:var(--text-faint);position:relative}
    .msg-read-status .read-tooltip{display:none;position:absolute;bottom:120%;left:0;background:var(--bg-raised);border:1px solid var(--border);border-radius:6px;padding:.35rem .5rem;font-size:.7rem;white-space:nowrap;z-index:10;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.3);line-height:1.4}
    .msg-read-status:hover .read-tooltip{display:block}
    .read-tooltip .read-line{color:var(--text-secondary)}
    .read-tooltip .unread-line{color:var(--red)}
    .msg-time{color:var(--text-faint);font-size:.66rem;transition:color .2s}
    .msg-item:hover .msg-time{color:var(--text-muted)}
    .msg-content{flex:1;color:var(--text-secondary);line-height:1.45;word-wrap:break-word;overflow-wrap:break-word;min-width:0}
    .msg-content p{margin:.2rem 0}.msg-content p:first-child{margin-top:0}.msg-content p:last-child{margin-bottom:0}
    .msg-content code{background:var(--bg);padding:.1rem .25rem;border-radius:3px;font-size:.76rem}
    .msg-content pre{background:var(--bg);padding:.4rem;border-radius:4px;overflow-x:auto;font-size:.76rem;margin:.3rem 0}
    .msg-content pre code{background:none;padding:0}
    .msg-content strong{color:var(--text)}
    .msg-content ul,.msg-content ol{margin:.2rem 0;padding-left:1.3rem}
    .msg-content h1,.msg-content h2,.msg-content h3{font-size:.85rem;margin:.3rem 0 .1rem;color:var(--text)}
    .msg-content table{border-collapse:collapse;font-size:.76rem;margin:.3rem 0}
    .msg-content th,.msg-content td{border:1px solid var(--border);padding:.2rem .4rem}
    .msg-content th{background:var(--surface)}

    .tasks-header{padding:.45rem 1rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg-raised);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:.5rem}
    .tasks-header-left{display:flex;align-items:center;gap:.5rem}
    .filter-bar{display:flex;gap:.3rem;flex-wrap:wrap}
    .filter-chip{font-size:.62rem;padding:.15rem .45rem;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;user-select:none;transition:all .2s;text-transform:uppercase;letter-spacing:.03em;font-weight:600}

    .tasks-panel{overflow-y:auto;min-height:60px;flex-shrink:0}
    .panel-resize-handle{height:5px;cursor:ns-resize;background:transparent;flex-shrink:0;position:relative;z-index:2}
    .panel-resize-handle::after{content:'';position:absolute;left:50%;transform:translateX(-50%);top:50%;margin-top:-1px;width:40px;height:2px;border-radius:2px;background:var(--border);transition:background .2s,width .2s}
    .panel-resize-handle:hover::after,.panel-resize-handle.dragging::after{background:var(--accent);width:60px}

    .badge-blocked{background:var(--red-dim);color:var(--red)}
    .badge-on_hold{background:var(--yellow-dim);color:var(--yellow)}
    .badge-backlog{background:var(--badge-pending-bg);color:var(--badge-pending-fg)}
    .badge-skipped{background:var(--badge-pending-bg);color:var(--text-faint)}
    .badge.status-changed{animation:popBadge .5s ease-out}
    .task-row{display:flex;gap:.5rem;align-items:center}
    .task-title{flex:1;font-weight:500;font-size:.82rem}
    .task-assignee{color:var(--accent);font-size:.72rem;white-space:nowrap;opacity:.8}
    .task-assignee.assignee-changed{animation:glowText 1s ease-out}
    .task-detail{margin-top:.35rem;padding-top:.35rem;border-top:1px solid var(--border);font-size:.76rem;color:var(--text-muted);display:none;line-height:1.5}
    .task.expanded .task-detail{display:block}
    .task-blocked-reason{font-size:.72rem;color:var(--red);margin-top:.2rem;padding-left:.2rem}
    .task-chevron{color:var(--text-faint);font-size:.6rem;transition:transform .2s}
    .task.expanded .task-chevron{transform:rotate(90deg)}
    .task-meta-line{display:none}
    .task-time{font-size:.65rem;color:var(--text-faint);margin-left:auto;white-space:nowrap;transition:color .2s}
    .task:hover .task-time{color:var(--text-muted)}
    .show-more-btn{background:var(--bg-raised);border:1px solid var(--border);border-radius:8px;padding:.45rem;text-align:center;color:var(--text-muted);font-size:.72rem;cursor:pointer;transition:all .2s}
    .show-more-btn:hover{border-color:var(--border-hover);color:var(--text-secondary)}
    .show-more-btn.all-loaded{cursor:default;font-style:italic;color:var(--text-faint);border-style:dashed}

    .footer{text-align:center;padding:.35rem;color:var(--text-faint);font-size:.68rem;border-top:1px solid var(--border);background:var(--bg-raised);flex-shrink:0;transition:color .2s}
    .footer:hover{color:var(--text-secondary)}
    .footer select{background:var(--bg-raised);color:var(--text-muted);border:1px solid var(--border);border-radius:4px;padding:.1rem .25rem;font-size:.68rem;cursor:pointer;outline:none;font-family:inherit}
    .footer select:hover{border-color:var(--border-hover);color:var(--text)}
    .reload-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
    .reload-overlay.visible{opacity:1;pointer-events:auto}
    .reload-box{background:var(--bg-raised);border:1px solid var(--border);border-radius:12px;padding:2rem;text-align:center;color:var(--text);font-size:1rem;box-shadow:var(--shadow-lg);max-width:320px}
    .reload-box .reload-spinner{margin-top:.75rem;color:var(--text-muted);font-size:.8rem}

    @keyframes slideIn{0%{opacity:0;transform:translateY(-6px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes flashBorder{0%{border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}100%{border-color:var(--border);box-shadow:none}}
    @keyframes popBadge{0%{transform:scale(1)}40%{transform:scale(1.25)}100%{transform:scale(1)}}
    @keyframes glowText{0%{color:#fff;text-shadow:0 0 8px var(--accent-glow)}100%{color:var(--accent);text-shadow:none}}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

    /* Background-first theme transition: backgrounds move immediately, foreground follows */
    :root{--theme-fg-delay:400ms;--theme-bg-dur:800ms;--theme-fg-dur:1000ms}
    :root.theme-transition body{transition:background-color var(--theme-bg-dur) ease 0s,color var(--theme-fg-dur) ease var(--theme-fg-delay)!important}
    :root.theme-transition .header,:root.theme-transition .sidebar,:root.theme-transition .panel-header,:root.theme-transition .footer,:root.theme-transition .layout{transition:background-color var(--theme-bg-dur) ease 0s!important}
    :root.theme-transition .agent-card,:root.theme-transition .task,:root.theme-transition .show-more-btn{transition:background-color var(--theme-bg-dur) ease 0s,color var(--theme-fg-dur) ease var(--theme-fg-delay),border-color var(--theme-fg-dur) ease var(--theme-fg-delay),box-shadow var(--theme-fg-dur) ease var(--theme-fg-delay)!important}
    :root.theme-transition .badge,:root.theme-transition .filter-chip,:root.theme-transition .theme-btn{transition:background-color var(--theme-bg-dur) ease 0s,color var(--theme-fg-dur) ease var(--theme-fg-delay),border-color var(--theme-fg-dur) ease var(--theme-fg-delay)!important}
    :root.theme-transition .msg-item,:root.theme-transition .msg-from,:root.theme-transition .msg-to,:root.theme-transition .msg-body{transition:background-color var(--theme-bg-dur) ease 0s,color var(--theme-fg-dur) ease var(--theme-fg-delay),border-color var(--theme-fg-dur) ease var(--theme-fg-delay)!important}

    @media(max-width:700px){
      .app{height:100dvh;height:100vh;max-height:100dvh}
      .main{flex-direction:column;overflow:hidden;flex:1;min-height:0}
      .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden}
      .sidebar-title{cursor:pointer;user-select:none}
      .sidebar-title::before{content:'\25BC ';font-size:.6rem}
      .sidebar.m-collapsed .sidebar-title::before{content:'\25B6 '}
      .sidebar.m-collapsed .agent-grid{display:none}

      .agent-grid{grid-template-columns:repeat(3,1fr);min-height:0;max-height:130px;overflow-y:auto;gap:.35rem;padding:0 .5rem .5rem}
      .agent-card{padding:.3rem;gap:.15rem}
      .agent-avatar{width:26px;height:26px;font-size:.65rem}

      .messages-panel.m-collapsed{display:none;flex:0}
      .panel-header{cursor:pointer;user-select:none;flex-shrink:0}
      .panel-header .collapse-arrow::before{content:'\25BC ';font-size:.6rem}
      .panel-header.m-hdr-collapsed .collapse-arrow::before{content:'\25B6 '}
      .tasks-header{cursor:pointer;user-select:none;flex-shrink:0}
      .tasks-header .collapse-arrow::before{content:'\25BC ';font-size:.6rem}
      .tasks-header.m-hdr-collapsed .collapse-arrow::before{content:'\25B6 '}
      .tasks-panel{flex:1;overflow-y:auto;min-height:0}
      .panel-resize-handle{display:none}
      .tasks-panel.m-collapsed{display:none;flex:0}
      .msg-item{flex-direction:column;gap:.3rem}
      .msg-meta{flex-direction:row;gap:.5rem;min-width:unset}
      .task-row{flex-wrap:wrap}
      .task-meta-line{display:flex!important;gap:.5rem;width:100%;font-size:.7rem;color:var(--text-muted)}

      .theme-switcher{position:relative;flex-wrap:wrap}

    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>&#x1F99E; llm-collab <span>dashboard</span></h1>
      <div class="header-right">
        <div class="theme-switcher">
          <button class="theme-btn active" data-theme="dark">Dark</button>
          <button class="theme-btn" data-theme="light">Light</button>
          <button class="theme-btn" data-theme="solarized">Solar</button>
          <button class="theme-btn" data-theme="wacky">Wacky</button>
          <button class="theme-btn" data-theme="midnight">Midnight</button>
          <button class="theme-btn" data-theme="pastel">Pastel</button>
          <button class="theme-btn" data-theme="crimson">Crimson</button>
          <button class="theme-btn" data-theme="fiice">Fi&#xb7;Ice</button>
          <button class="theme-btn" data-theme="sunset">Sunset</button>
        </div>
        <div class="poll-indicator">
          <span class="poll-dot" id="poll-dot"></span>
          <span id="poll-text">Connecting&#x2026;</span>
        </div>
      </div>
    </header>
    <div class="main">
      <aside class="sidebar">
        <div class="sidebar-title">Agents <span class="m-count heading-count" id="agent-m-count"></span></div>
        <div class="agent-grid" id="agents"></div>
      </aside>
      <div class="content">
        <div class="panel-header">
          <span class="panel-title"><span class="collapse-arrow"></span><span class="icon">&#x1F4AC;</span> Messages <span class="msg-count-btn heading-count" id="msg-count" onclick="event.stopPropagation();toggleMsgFilter()"></span></span><span class="filter-chip" id="msg-today-btn" style="margin-left:auto" onclick="event.stopPropagation();toggleMsgTodayFilter()" title="Show today's messages only">Today</span>
        </div>
        <div class="messages-panel"><div class="msg-list" id="messages"></div></div>
        <div class="panel-resize-handle" id="panel-resize-handle"></div>
        <div class="tasks-header">
          <div class="tasks-header-left">
            <span class="panel-title"><span class="collapse-arrow"></span><span class="icon">&#x1F4CB;</span> Tasks</span>
            <span id="task-count" class="heading-count"></span>
          </div>
          <div class="filter-bar" id="filter-bar"></div>
        </div>
        <div class="tasks-panel"><div class="task-list" id="tasks"></div></div>
      </div>
    </div>
    <footer class="footer" id="footer"></footer>
  </div>
  <div class="reload-overlay" id="reload-overlay"><div class="reload-box">Webpage update detected. Please hold while we refresh&#x2026;<div class="reload-spinner">&#x27F3;</div></div></div>

  <script>
    const POLL_INTERVALS=[{ms:5e3,label:'5s'},{ms:1e4,label:'10s'},{ms:3e4,label:'30s'},{ms:6e4,label:'1m'},{ms:12e4,label:'2m'},{ms:3e5,label:'5m'}];
    const DEFAULT_POLL_MS=3e4,PLAN_URL='plan.json',AGENT_COLORS=['#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#06b6d4','#84cc16'];
    let pollIntervalMs=parseInt(localStorage.getItem('poll-interval'))||DEFAULT_POLL_MS;
    let msgFilterUnread=localStorage.getItem('msg-filter-unread')==='1';
    let msgFilterToday=localStorage.getItem('msg-filter-today')==='1';
    let previousPlan=null,pollTimer=null,activeFilters=new Set(),activeAgentFilters=new Set(),currentTasks=[],agentMeta={};
    const TASK_PAGE_SIZE=30;let taskShowCount=TASK_PAGE_SIZE,sortedTasks=[];

    function agentColor(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return AGENT_COLORS[Math.abs(h)%AGENT_COLORS.length]}
    function agentInitial(n){return n.split('-').map(w=>w[0]).join('').toUpperCase().slice(0,2)}

    let _themeDelay=parseInt(localStorage.getItem('theme-fg-delay'))||400;
    let _bgDur=parseInt(localStorage.getItem('theme-bg-dur'))||800;
    let _fgDur=parseInt(localStorage.getItem('theme-fg-dur'))||1000;
    function _applyThemeVars(){const r=document.documentElement;r.style.setProperty('--theme-fg-delay',_themeDelay+'ms');r.style.setProperty('--theme-bg-dur',_bgDur+'ms');r.style.setProperty('--theme-fg-dur',_fgDur+'ms')}
    _applyThemeVars();
    const _log=(n,v)=>console.log('%c'+n+' → '+v+'ms','color:#8b5cf6;font-weight:bold');
    Object.defineProperty(window,'themeDelay',{get:()=>_themeDelay,set:(v)=>{_themeDelay=v;_applyThemeVars();localStorage.setItem('theme-fg-delay',v);_log('themeDelay',v)}});
    Object.defineProperty(window,'bgDuration',{get:()=>_bgDur,set:(v)=>{_bgDur=v;_applyThemeVars();localStorage.setItem('theme-bg-dur',v);_log('bgDuration',v)}});
    Object.defineProperty(window,'fgDuration',{get:()=>_fgDur,set:(v)=>{_fgDur=v;_applyThemeVars();localStorage.setItem('theme-fg-dur',v);_log('fgDuration',v)}});

    function setTheme(t){const r=document.documentElement;r.classList.add('theme-transition');r.setAttribute('data-theme',t);localStorage.setItem('dashboard-theme',t);document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===t));setTimeout(()=>r.classList.remove('theme-transition'),_themeDelay+Math.max(_bgDur,_fgDur)+50)}
    document.querySelectorAll('.theme-btn').forEach(b=>b.addEventListener('click',function(e){const sw=document.querySelector('.theme-switcher');if(this.classList.contains('active')){e.stopPropagation();sw.classList.toggle('expanded')}else{setTheme(this.dataset.theme);sw.classList.remove('expanded')}}));
    const saved=localStorage.getItem('dashboard-theme');if(saved)setTheme(saved);

    // --- Panel resize ---
    (function(){
      const handle=document.getElementById('panel-resize-handle');
      const tasksPanel=document.querySelector('.tasks-panel');
      const content=document.querySelector('.content');
      if(!handle||!tasksPanel||!content)return;
      const STOR_KEY='tasks-panel-height';
      const savedH=localStorage.getItem(STOR_KEY);
      function applyHeight(h){tasksPanel.style.height=h+'px';}
      if(savedH){
        applyHeight(parseInt(savedH));
      } else {
        // default to ~50% of content area after layout settles
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          const h=Math.round(content.offsetHeight*0.4);
          applyHeight(h);
        }));
      }
      let dragging=false,startY=0,startH=0;
      handle.addEventListener('mousedown',function(e){
        if(window.innerWidth<=700)return;
        dragging=true;startY=e.clientY;startH=tasksPanel.offsetHeight;
        handle.classList.add('dragging');
        document.body.style.cursor='ns-resize';
        document.body.style.userSelect='none';
        e.preventDefault();
      });
      document.addEventListener('mousemove',function(e){
        if(!dragging)return;
        const delta=startY-e.clientY;
        const contentH=content.offsetHeight;
        const minH=60,maxH=contentH-80;
        const newH=Math.min(maxH,Math.max(minH,startH+delta));
        tasksPanel.style.height=newH+'px';
      });
      document.addEventListener('mouseup',function(){
        if(!dragging)return;
        dragging=false;
        handle.classList.remove('dragging');
        document.body.style.cursor='';
        document.body.style.userSelect='';
        localStorage.setItem(STOR_KEY,tasksPanel.offsetHeight);
      });
    })();

    function diffTasks(o,n){const m=new Map(o.map(t=>[t.id,t])),a=[],c=[];for(const t of n){if(!m.has(t.id))a.push(t.id);else{const p=m.get(t.id);if(p.status!==t.status||p.assignee!==t.assignee||p.result!==t.result)c.push({id:t.id,statusChanged:p.status!==t.status,assigneeChanged:p.assignee!==t.assignee})}}return{added:a,changed:c}}
    function setPollStatus(t,f){document.getElementById('poll-text').textContent=t;document.getElementById('poll-dot').classList.toggle('fetching',!!f)}

    async function fetchPlan(){
      setPollStatus('Checking\u2026',true);
      try{
        const r=await fetch(PLAN_URL+'?_='+Date.now());if(!r.ok)throw new Error('HTTP '+r.status);
        const p=await r.json(),tasks=p.tasks||[];let diff=null;
        if(previousPlan){const o=previousPlan.tasks||[];diff=diffTasks(o,tasks);if(!diff.added.length&&!diff.changed.length){setPollStatus('Live \xb7 '+new Date().toLocaleTimeString(),false);return}}
        renderDashboard(p,diff);previousPlan=p;setPollStatus('Live \xb7 '+new Date().toLocaleTimeString(),false);
      }catch(e){setPollStatus('Error \xb7 retrying\u2026',false)}
    }

    function renderDashboard(plan,diff){
      const tasks=plan.tasks||[];renderAgents(tasks,diff);renderFilterBar(tasks);renderTasks(tasks,diff);currentTasks=tasks;updateTaskCount();
      if(plan.updated_at){const f=document.getElementById('footer');const opts=POLL_INTERVALS.map(p=>'<option value="'+p.ms+'"'+(p.ms===pollIntervalMs?' selected':'')+'>'+p.label+'</option>').join('');f.innerHTML='Last update: '+new Date(plan.updated_at).toLocaleString()+' \xb7 Refresh: <select id="poll-select">'+opts+'</select>';document.getElementById('poll-select').onchange=function(){pollIntervalMs=parseInt(this.value);localStorage.setItem('poll-interval',pollIntervalMs);if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(fetchAll,pollIntervalMs)}}
    }

    function renderAgents(tasks){
      const el=document.getElementById('agents'),assignees=[...new Set(tasks.map(t=>t.assignee).filter(Boolean))];
      el.innerHTML=assignees.map(id=>{const at=tasks.filter(t=>t.assignee===id),done=at.filter(t=>t.status==='done').length,ip=at.filter(t=>t.status==='in_progress').length,fc=activeAgentFilters.has(id)?' filter-active':'',col=agentColor(id),meta=agentMeta[id]||{},aliases=meta.aliases||[],role=meta.role||'',tip=aliases.length?'aka '+aliases.join(', ')+(role?' \xb7 '+role:''):(role||id);return'<div class="agent-card'+fc+'" data-agent="'+id+'" title="'+tip+'"><div class="agent-avatar" style="background:'+col+'">'+agentInitial(id)+'</div><div class="agent-name">'+id+'</div><div class="agent-stats"><span><span class="mini-dot done"></span>'+done+'</span>'+(ip?'<span><span class="mini-dot active"></span>'+ip+'</span>':'')+'</div></div>'}).join('');
      el.querySelectorAll('.agent-card').forEach(c=>c.addEventListener('click',()=>{const id=c.dataset.agent;activeAgentFilters.has(id)?activeAgentFilters.delete(id):activeAgentFilters.add(id);c.classList.toggle('filter-active');applyFilters()}));
      const mc=document.getElementById('agent-m-count');if(mc)mc.textContent='('+assignees.length+')';
    }

    function renderFilterBar(tasks){
      const el=document.getElementById('filter-bar'),counts={};tasks.forEach(t=>counts[t.status]=(counts[t.status]||0)+1);
      const order=['in_progress','pending','blocked','on_hold','backlog','done','skipped'];
      el.innerHTML=order.filter(s=>counts[s]).map(s=>{const ac=activeFilters.has(s)?' active':'';return'<span class="filter-chip'+ac+'" data-status="'+s+'">'+s.replace('_',' ')+'<span class="chip-count">'+counts[s]+'</span></span>'}).join('');
      el.querySelectorAll('.filter-chip').forEach(c=>c.addEventListener('click',()=>{const st=c.dataset.status;if(activeFilters.has(st)){activeFilters.delete(st);c.classList.remove('active')}else{activeFilters.add(st);c.classList.add('active')}applyFilters()}));
    }

    function renderTasks(tasks,diff){
      const el=document.getElementById('tasks'),so={in_progress:0,pending:1,blocked:2,on_hold:3,backlog:4,done:5,skipped:6},ix=tasks.map((t,i)=>({...t,_idx:i}));
      sortedTasks=ix.sort((a,b)=>{const d=(so[a.status]??7)-(so[b.status]??7);return d!==0?d:b._idx-a._idx});
      const addS=new Set(diff?diff.added:[]),chM=new Map(diff?diff.changed.map(c=>[c.id,c]):[]),knownAgents=new Set(Object.keys(agentMeta));
      taskShowCount=TASK_PAGE_SIZE;renderTaskPage(el,sortedTasks,addS,chM,knownAgents);
    }

    function renderTaskPage(el,sorted,addS,chM,knownAgents){
      const visible=sorted.slice(0,taskShowCount);
      el.innerHTML=visible.map(t=>{const isN=addS.has(t.id),ch=chM.get(t.id),tc=isN?' new-task':(ch?' changed-task':''),bc=ch&&ch.statusChanged?' status-changed':'',ac=ch&&ch.assigneeChanged?' assignee-changed':'',unknownAgent=t.assignee&&!knownAgents.has(t.assignee),isBlocked=t.status==='blocked'&&t.notes,canExpand=!!t.description,inlineNote=isBlocked?'<div class="task-blocked-reason">\u2298 '+t.notes+'</div>':'',agentWarning=unknownAgent?'<span title="Unknown agent"> \u203c\ufe0f</span>':'',detail=t.result?'<strong>Result:</strong> '+t.result:t.description||'';const tsRaw=t.completed_at||t.started_at||t.created_at||'';const dateStr=tsRaw?new Date(tsRaw).toLocaleDateString(undefined,{month:'short',day:'numeric'}):'';const metaLine=(t.assignee||dateStr)?'<div class="task-meta-line">'+(t.assignee?'<span class="task-assignee'+ac+'">'+t.assignee+agentWarning+'</span>':'')+(dateStr?'<span>'+dateStr+'</span>':'')+'</div>':'';return'<div class="task'+tc+'" data-task-id="'+t.id+'"'+(canExpand?' data-expandable':'')+'>'+metaLine+'<div class="task-row"><span class="badge badge-'+t.status+bc+'">'+t.status.replace('_',' ')+'</span><span class="task-title">'+t.title+'</span>'+(t.assignee?'<span class="task-assignee'+ac+' task-assignee-desktop">'+t.assignee+agentWarning+'</span>':'')+(dateStr?'<span class="task-time" title="'+tsRaw+'">'+dateStr+'</span>':'')+(canExpand?'<span class="task-chevron">\u25b8</span>':'')+'</div>'+inlineNote+(canExpand?'<div class="task-detail">'+detail+'</div>':'')+'</div>'}).join('');
      if(taskShowCount<sorted.length)el.innerHTML+='<div class="show-more-btn" onclick="showMoreTasks()">Show more ('+(sorted.length-taskShowCount)+' remaining)</div>';
      el.querySelectorAll('.task[data-expandable]').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('expanded')));applyFilters();
    }

    function showMoreTasks(){taskShowCount+=TASK_PAGE_SIZE;const el=document.getElementById('tasks'),knownAgents=new Set(Object.keys(agentMeta));renderTaskPage(el,sortedTasks,new Set(),new Map(),knownAgents)}
    function updateTaskCount(){const v=document.querySelectorAll('.task[data-task-id]:not(.filtered-out)').length;document.getElementById('task-count').textContent=v+' shown'}
    function applyFilters(){document.querySelectorAll('.task[data-task-id]').forEach(el=>{const t=currentTasks.find(x=>x.id===el.dataset.taskId);if(!t)return;const sOk=!activeFilters.size||activeFilters.has(t.status),aOk=!activeAgentFilters.size||activeAgentFilters.has(t.assignee||'');el.classList.toggle('filtered-out',!(sOk&&aOk))});updateTaskCount();applyMsgAgentFilter()}
    function applyMsgAgentFilter(){document.querySelectorAll('.msg-item').forEach(el=>{if(!activeAgentFilters.size){el.classList.remove('filtered-out');return}const from=el.querySelector('.msg-from')?.textContent||'';const toEl=el.querySelector('.msg-to')?.textContent||'';const match=[...activeAgentFilters].some(a=>from===a||toEl.includes(a));el.classList.toggle('filtered-out',!match)})}

    /* Avatar animation system */
    const avatarAnims=[
      {name:'Orbit pulse',      desc:'Glowing ring orbits the avatar',                  cls:'av-0'},
      {name:'Heartbeat',        desc:'Scale pulses in a heartbeat rhythm',              cls:'av-1'},
      {name:'Ripple burst',     desc:'Concentric rings expand and fade outward',        cls:'av-2'},
      {name:'Jello wobble',     desc:'Alternating scaleX/scaleY squish and stretch',    cls:'av-3'},
      {name:'Color strobe',     desc:'Background hue cycles rapidly then snaps back',   cls:'av-4'},
      {name:'Spin + bounce',    desc:'Full rotation combined with vertical bounce',      cls:'av-5'},
      {name:'Shake',            desc:'Rapid horizontal jitter then bounce-in',          cls:'av-6'},
    ];
    const _animTimers={};
    function triggerAgentAnim(agentId,index,seconds){
      const anim=avatarAnims[index];if(!anim)return;
      const card=document.querySelector('.agent-card[data-agent="'+agentId+'"]');
      if(!card)return;
      const avatar=card.querySelector('.agent-avatar');if(!avatar)return;
      const dur=(typeof seconds==='number'&&seconds>0?seconds:10)*1000;
      const wildDur=dur*0.3;
      avatarAnims.forEach(a=>{avatar.classList.remove(a.cls);avatar.classList.remove(a.cls+'w')});
      clearTimeout(_animTimers[agentId]);clearTimeout(_animTimers[agentId+'_settle']);
      avatar.classList.add(anim.cls+'w');
      _animTimers[agentId+'_settle']=setTimeout(()=>{avatar.classList.remove(anim.cls+'w');avatar.classList.add(anim.cls)},wildDur);
      _animTimers[agentId]=setTimeout(()=>{avatar.classList.remove(anim.cls);avatar.classList.remove(anim.cls+'w')},dur);
    }
    window.testAnim=function(agentId,index,seconds){
      const anim=avatarAnims[index];
      if(!anim){console.warn('testAnim: invalid index '+index+'. Valid: 0–'+(avatarAnims.length-1));return}
      const dur=typeof seconds==='number'&&seconds>0?seconds:10;
      console.log('Agent: '+agentId+' | Animation '+index+': '+anim.name+' — '+anim.desc+' | Duration: '+dur+'s');
      triggerAgentAnim(agentId,index,dur);
    };
    let _prevMsgIds=null;

    async function fetchMessages(){
      try{const r=await fetch('messages.json?_='+Date.now());if(!r.ok)return;const data=await r.json();const allMsgs=(data.messages||[]).filter(m=>!m.retracted).slice().reverse();const el=document.getElementById('messages');
      if(!allMsgs.length){el.innerHTML='<div style="color:var(--text-faint);text-align:center;padding:2rem">No messages</div>';_prevMsgIds=new Set();return}
      const agents=Object.keys(agentMeta);
      function isMsgRead(m){if(m.to==='all'){const rb=(m.read_by||[]).filter(a=>a!==m.from);const expected=agents.filter(a=>a!==m.from);return!!m.read||(expected.length>0&&expected.every(a=>rb.includes(a)))}return!!m.read}

      /* Detect new messages and animate sender avatar */
      const curIds=new Set(allMsgs.map(m=>m.id));
      if(_prevMsgIds!==null){
        allMsgs.forEach((m,i)=>{if(!_prevMsgIds.has(m.id)&&m.from){triggerAgentAnim(m.from,i%avatarAnims.length)}});
      }
      _prevMsgIds=curIds;

      const unread=allMsgs.filter(m=>!isMsgRead(m)).length;const countEl=document.getElementById('msg-count');countEl.textContent=(unread||msgFilterUnread)?'('+unread+')':'';countEl.classList.toggle('active',msgFilterUnread);
      const todayBtn=document.getElementById('msg-today-btn');todayBtn.classList.toggle('active',msgFilterToday);
      const todayStr=new Date().toISOString().slice(0,10);
      let msgs=allMsgs;
      if(msgFilterToday)msgs=msgs.filter(m=>m.timestamp&&m.timestamp.slice(0,10)===todayStr);
      if(msgFilterUnread)msgs=msgs.filter(m=>!isMsgRead(m));
      el.innerHTML=msgs.slice(0,30).map(m=>{const ts=m.timestamp?new Date(m.timestamp).toLocaleString():'';const cls=isMsgRead(m)?'':'unread';let toLabel='\u2192 '+m.to;if(m.to==='all'){const expected=agents.filter(a=>a!==m.from);const rb=(m.read_by||[]).filter(a=>a!==m.from&&expected.includes(a));const ur=expected.filter(a=>!rb.includes(a));if(rb.length>0||ur.length>0){const readLine=rb.length?'<div class="read-line">Read: '+rb.join(', ')+'</div>':'';const unreadLine=ur.length?'<div class="unread-line">Unread: '+ur.join(', ')+'</div>':'';toLabel='\u2192 all <span class="msg-read-status">('+rb.length+'/'+expected.length+')<span class="read-tooltip">'+readLine+unreadLine+'</span></span>'}}return'<div class="msg-item '+cls+'"><div class="msg-meta"><span class="msg-from">'+m.from+'</span><span class="msg-to">'+toLabel+'</span><span class="msg-time">'+ts+'</span></div><div class="msg-content">'+marked.parse(m.content||'')+'</div></div>'}).join('');
      if((msgFilterUnread||msgFilterToday)&&!msgs.length)el.innerHTML='<div style="color:var(--text-faint);text-align:center;padding:1rem">No '+(msgFilterToday&&msgFilterUnread?'unread messages today':msgFilterToday?'messages today':'unread messages')+'</div>';
      applyMsgAgentFilter();
      }catch(e){}
    }
    function toggleMsgFilter(){msgFilterUnread=!msgFilterUnread;localStorage.setItem('msg-filter-unread',msgFilterUnread?'1':'0');fetchMessages()}
    function toggleMsgTodayFilter(){msgFilterToday=!msgFilterToday;localStorage.setItem('msg-filter-today',msgFilterToday?'1':'0');fetchMessages()}

    async function fetchAgentMeta(){try{const r=await fetch('agents.json?_='+Date.now());if(r.ok)agentMeta=await r.json()}catch(e){}}

    let pageHash=null;
    async function checkPageUpdate(){try{const r=await fetch('index.html?_='+Date.now());if(!r.ok)return;const txt=await r.text();let h=0;for(let i=0;i<txt.length;i++){h=((h<<5)-h)+txt.charCodeAt(i);h|=0}if(pageHash===null){pageHash=h}else if(h!==pageHash){document.getElementById('reload-overlay').classList.add('visible');sessionStorage.setItem('page-reload-reason','update');setTimeout(()=>location.reload(),3e3)}}catch(e){}}
    if(sessionStorage.getItem('page-reload-reason')==='update'){sessionStorage.removeItem('page-reload-reason');console.log('['+new Date().toLocaleString()+'] Webpage refreshed to load update')}

    /* Sidebar collapse — mobile toggle, desktop 3-state cycle via heading click */
    document.querySelector('.sidebar-title').addEventListener('click',function(e){
      if(window.innerWidth<=700){this.closest('.sidebar').classList.toggle('m-collapsed');return}
      e.stopPropagation();
      const idx=sidebarStates.indexOf(sidebarState);
      sidebarState=sidebarStates[(idx+1)%sidebarStates.length];
      applySidebarState(sidebarState, true);
    });
    document.querySelector('.panel-header').addEventListener('click',function(){if(window.innerWidth<=700){const mp=document.querySelector('.messages-panel');mp.classList.toggle('m-collapsed');this.classList.toggle('m-hdr-collapsed')}});
    document.querySelector('.tasks-header').addEventListener('click',function(e){if(window.innerWidth<=700&&!e.target.closest('.filter-chip')){const tp=document.querySelector('.tasks-panel');tp.classList.toggle('m-collapsed');this.classList.toggle('m-hdr-collapsed')}});

    /* Desktop agents panel collapse (3-state: expanded → partial → hidden → expanded) */
    const sidebarStates=['expanded','partial','hidden'];
    let sidebarState=localStorage.getItem('sidebar-state')||'expanded';
    function applySidebarState(s,animate){
      const sb=document.querySelector('.sidebar');
      if(animate&&s==='hidden'){
        sb.classList.add('d-collapsing');
        setTimeout(()=>{sb.classList.remove('d-collapsing','d-partial');sb.classList.add('d-hidden');localStorage.setItem('sidebar-state',s)},200);
        return;
      }
      sb.classList.remove('d-partial','d-hidden','d-collapsing');
      if(s==='partial')sb.classList.add('d-partial');
      else if(s==='hidden')sb.classList.add('d-hidden');
      localStorage.setItem('sidebar-state',s);
    }
    applySidebarState(sidebarState);

    async function fetchAll(){await checkPageUpdate();await fetchAgentMeta();await fetchPlan();await fetchMessages()}
    fetchAll().then(()=>{pollTimer=setInterval(fetchAll,pollIntervalMs)});
  </script>
</body>
</html>
