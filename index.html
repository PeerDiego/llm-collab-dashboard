<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>llm-collab Dashboard</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d1117; --bg-raised: #161b22; --bg-hover: #1c2129;
      --surface: #161b22; --border: #30363d; --border-hover: #484f58;
      --text: #e6edf3; --text-secondary: #c9d1d9; --text-muted: #8b949e; --text-faint: #484f58;
      --accent: #bc8cff; --accent-dim: rgba(188,140,255,0.15); --accent-glow: rgba(188,140,255,0.4);
      --green: #3fb950; --green-dim: rgba(63,185,80,0.15);
      --yellow: #d29922; --yellow-dim: rgba(210,153,34,0.15);
      --red: #f85149; --red-dim: rgba(248,81,73,0.15);
      --blue: #58a6ff;
      --badge-pending-bg: #30363d; --badge-pending-fg: #8b949e;
      --shadow: 0 1px 3px rgba(0,0,0,0.3); --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
    }
    :root[data-theme="light"] {
      --bg: #f6f8fa; --bg-raised: #ffffff; --bg-hover: #f3f4f6;
      --surface: #ffffff; --border: #d0d7de; --border-hover: #afb8c1;
      --text: #1f2328; --text-secondary: #32383f; --text-muted: #656d76; --text-faint: #8b949e;
      --accent: #8250df; --accent-dim: rgba(130,80,223,0.1); --accent-glow: rgba(130,80,223,0.3);
      --green: #1a7f37; --green-dim: rgba(26,127,55,0.1);
      --yellow: #9a6700; --yellow-dim: rgba(154,103,0,0.1);
      --red: #cf222e; --red-dim: rgba(207,34,46,0.1);
      --blue: #0969da;
      --badge-pending-bg: #eaeef2; --badge-pending-fg: #656d76;
      --shadow: 0 1px 3px rgba(31,35,40,0.1); --shadow-lg: 0 8px 24px rgba(31,35,40,0.15);
    }
    :root[data-theme="solarized"] {
      --bg: #002b36; --bg-raised: #073642; --bg-hover: #094150;
      --surface: #073642; --border: #586e75; --border-hover: #657b83;
      --text: #93a1a1; --text-secondary: #839496; --text-muted: #657b83; --text-faint: #586e75;
      --accent: #d33682; --accent-dim: rgba(211,54,130,0.15); --accent-glow: rgba(211,54,130,0.4);
      --green: #859900; --green-dim: rgba(133,153,0,0.15);
      --yellow: #b58900; --yellow-dim: rgba(181,137,0,0.15);
      --red: #dc322f; --red-dim: rgba(220,50,47,0.15);
      --blue: #268bd2;
      --badge-pending-bg: #073642; --badge-pending-fg: #657b83;
      --shadow: 0 1px 3px rgba(0,0,0,0.4); --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-secondary); line-height: 1.5; transition: background 0.4s, color 0.4s; }
    .container { margin: 0 auto; padding: 2rem 1.5rem; }
    .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .page-header h1 span { font-weight: 400; color: var(--text-muted); }
    .controls { display: flex; align-items: center; gap: 1rem; }
    .poll-indicator { display: flex; align-items: center; gap: 0.4rem; color: var(--text-faint); font-size: 0.75rem; }
    .poll-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .poll-dot.fetching { background: var(--yellow); animation: pulse-dot 0.6s ease-in-out infinite; }
    .theme-switcher { display: flex; background: var(--bg-raised); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .theme-btn { background: none; border: none; color: var(--text-muted); font-size: 0.75rem; padding: 0.35rem 0.6rem; cursor: pointer; transition: all 0.2s; }
    .theme-btn:hover { color: var(--text); background: var(--bg-hover); }
    .theme-btn.active { color: var(--accent); background: var(--accent-dim); }
    .progress-section { margin-bottom: 2rem; }
    .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
    .progress-pct { font-size: 2rem; font-weight: 700; color: var(--text); }
    .progress-label { font-size: 0.85rem; color: var(--text-muted); }
    .progress-bar { background: var(--border); border-radius: 6px; height: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--blue)); border-radius: 6px; transition: width 1s ease-in-out; }
    .stats { display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; cursor: pointer; user-select: none; transition: all 0.3s; flex: 1 1 auto; display: flex; align-items: center; gap: 0.5rem; }
    .stat.empty { padding: 0.4rem 0.75rem; opacity: 0.65; }
    .stat.empty .stat-icon { display: none; }
    .stat.empty .stat-value { font-size: 1rem; }
    .stat.empty .stat-label { font-size: 0.65rem; }
    .stat.empty:hover { opacity: 1; border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
    .stat:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 0 8px var(--accent-glow); }
    .stat.filter-active { border-color: var(--accent); background: var(--accent-dim); }
    .stat-done.filter-active { background: var(--green-dim); border-color: var(--green); }
    .stat-progress.filter-active { background: var(--yellow-dim); border-color: var(--yellow); }
    .stat-blocked.filter-active { background: var(--red-dim); border-color: var(--red); }
    .stat.changed { animation: statPulse 0.6s ease-out; }
    .stat-icon { font-size: 1rem; flex-shrink: 0; }
    .stat-value { font-size: 1.4rem; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-done .stat-value { color: var(--green); }
    .stat-progress .stat-value { color: var(--yellow); }
    .stat-pending .stat-value { color: var(--text-muted); }
    .stat-blocked .stat-value { color: var(--red); }
    .stat-value.count-changed { display: inline-block; animation: countUp 0.4s ease-out; }
    .section { margin-bottom: 2rem; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; cursor: pointer; user-select: none; }
    .section-header:hover .section-title { color: var(--text); }
    .section-header:hover .collapse-icon { color: var(--text); }
    .section-title { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 0.4rem; }
    .section-count { font-size: 0.75rem; color: var(--text-faint); }
    .collapse-icon { font-size: 0.7rem; color: var(--text-faint); transition: transform 0.3s, color 0.2s; }
    .section.collapsed .collapse-icon { transform: rotate(-90deg); }
    .section-body { transition: all 0.3s ease; overflow: hidden; }
    .section.collapsed .section-body { display: none; }
    .collapsed-count { font-size: 0.75rem; color: var(--text-faint); font-weight: 400; }
    .agents { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; }
    .agent-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; transition: all 0.3s; cursor: pointer; user-select: none; }
    .agent-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 0 8px var(--accent-glow); }
    .agent-card.filter-active { border-color: var(--accent); background: var(--accent-dim); }
    .agent-card.new-agent { animation: slideIn 0.6s ease-out; }
    .agent-card.changed { animation: statPulse 0.6s ease-out; }
    .agent-top { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .agent-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0; }
    .agent-name { font-weight: 600; color: var(--accent); font-size: 0.9rem; }
    .agent-stats { display: flex; gap: 0.75rem; font-size: 0.8rem; color: var(--text-muted); }
    .agent-stat { display: flex; align-items: center; gap: 0.25rem; }
    .mini-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mini-dot.done { background: var(--green); }
    .mini-dot.active { background: var(--yellow); }
    .task-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .task { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; transition: all 0.4s ease; max-height: 200px; opacity: 1; overflow: hidden; cursor: pointer; }
    .task:hover { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
    .task.filtered-out { max-height: 0; opacity: 0; margin: 0; padding: 0; border-width: 0; }
    .task.new-task { animation: slideIn 0.6s ease-out; }
    .task.changed-task { animation: flashBorder 0.8s ease-out; }
    .task-row { display: flex; align-items: center; gap: 0.75rem; }
    .badge { font-size: 0.7rem; padding: 0.2rem 0.55rem; border-radius: 4px; font-weight: 600; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.03em; transition: all 0.3s; }
    .badge-done { background: var(--green-dim); color: var(--green); }
    .badge-in_progress { background: var(--yellow-dim); color: var(--yellow); }
    .badge-pending { background: var(--badge-pending-bg); color: var(--badge-pending-fg); }
    .badge-blocked { background: var(--red-dim); color: var(--red); }
    .badge-skipped { background: var(--badge-pending-bg); color: var(--badge-pending-fg); }
    .badge-on_hold { background: var(--accent-dim); color: var(--accent); }
    .badge-backlog { background: var(--badge-pending-bg); color: var(--text-faint); }
    .badge.status-changed { animation: popBadge 0.5s ease-out; }
    .task-title { flex: 1; font-weight: 500; font-size: 0.9rem; }
    .task-assignee { color: var(--accent); font-size: 0.8rem; white-space: nowrap; opacity: 0.8; }
    .task-assignee.assignee-changed { animation: glowText 1s ease-out; }
    .task-detail { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text-muted); display: none; line-height: 1.6; }
    .task.expanded .task-detail { display: block; animation: fadeIn 0.3s ease-out; }
    .task.expanded { max-height: 500px; }
    .task-chevron { color: var(--text-faint); font-size: 0.7rem; transition: transform 0.2s; }
    .task.expanded .task-chevron { transform: rotate(90deg); }
    .footer { text-align: center; padding: 1rem 0; color: var(--text-faint); font-size: 0.75rem; }
    .footer select { background: var(--card-bg); color: var(--text-faint); border: 1px solid var(--border); border-radius: 4px; font-size: 0.75rem; padding: 1px 2px; cursor: pointer; }
    #loading { text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-size: 0.9rem; }
    .error { color: var(--red); text-align: center; padding: 2rem; }
    @keyframes slideIn { 0% { opacity: 0; max-height: 0; transform: translateY(-8px); } 100% { opacity: 1; max-height: 200px; transform: translateY(0); } }
    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes flashBorder { 0% { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); } 100% { border-color: var(--border); box-shadow: none; } }
    @keyframes statPulse { 0% { transform: scale(1); } 30% { transform: scale(1.04); } 100% { transform: scale(1); } }
    @keyframes popBadge { 0% { transform: scale(1); } 40% { transform: scale(1.25); } 100% { transform: scale(1); } }
    @keyframes glowText { 0% { color: #fff; text-shadow: 0 0 8px var(--accent-glow); } 100% { color: var(--accent); text-shadow: none; } }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes countUp { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    @media (max-width: 600px) { .container { padding: 1rem; } .page-header { flex-direction: column; } .page-header h1 { font-size: 1.25rem; } .stats { grid-template-columns: repeat(2, 1fr); } .stat-value { font-size: 1.4rem; } .progress-pct { font-size: 1.5rem; } .agents { grid-template-columns: 1fr; } .msg-item { flex-direction: column; gap: 0.35rem; } .msg-meta { flex-direction: row; gap: 0.5rem; min-width: unset; flex-wrap: wrap; } }

    /* Messages */
    .msg-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .msg-count-btn { cursor: pointer; border-radius: 4px; padding: 0 4px; }
    .msg-count-btn:hover { background: var(--accent-dim); }
    .msg-count-btn.active { color: var(--accent); background: var(--accent-dim); }
    .msg-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 1rem; display: flex; gap: 0.75rem; align-items: flex-start; font-size: 0.85rem; }
    .msg-item.unread { border-left: 3px solid var(--accent); }
    .msg-meta { flex-shrink: 0; display: flex; flex-direction: column; gap: 0.15rem; min-width: 90px; }
    .msg-from { font-weight: 600; color: var(--accent); font-size: 0.8rem; }
    .msg-to { color: var(--text-faint); font-size: 0.7rem; }
    .msg-read-status { color: var(--text-faint); }
    .msg-time { color: var(--text-faint); font-size: 0.7rem; }
    .msg-content { flex: 1; color: var(--text-secondary); line-height: 1.5; word-wrap: break-word; overflow-wrap: break-word; min-width: 0; }
    .msg-content p { margin: 0.3rem 0; }
    .msg-content p:first-child { margin-top: 0; }
    .msg-content p:last-child { margin-bottom: 0; }
    .msg-content code { background: var(--surface); padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.8rem; }
    .msg-content pre { background: var(--surface); padding: 0.5rem; border-radius: 4px; overflow-x: auto; font-size: 0.8rem; margin: 0.4rem 0; }
    .msg-content pre code { background: none; padding: 0; }
    .msg-content table { border-collapse: collapse; font-size: 0.8rem; margin: 0.4rem 0; }
    .msg-content th, .msg-content td { border: 1px solid var(--border); padding: 0.25rem 0.5rem; }
    .msg-content th { background: var(--surface); }
    .msg-content strong { color: var(--text-primary); }
    .msg-content ul, .msg-content ol { margin: 0.3rem 0; padding-left: 1.5rem; }
    .msg-content h1, .msg-content h2, .msg-content h3 { font-size: 0.9rem; margin: 0.4rem 0 0.2rem; color: var(--text-primary); }

    /* Inbox Log */
    .log-list { display: flex; flex-direction: column; gap: 0.35rem; }
    .log-entry { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem; display: flex; gap: 0.75rem; align-items: center; font-size: 0.8rem; }
    .log-entry.log-delivered { border-left: 3px solid var(--green); }
    .log-entry.log-unauthorized { border-left: 3px solid var(--red); }
    .log-entry.log-bad_syntax { border-left: 3px solid var(--yellow); }
    .log-type { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; min-width: 80px; flex-shrink: 0; }
    .log-delivered .log-type { color: var(--green); }
    .log-unauthorized .log-type { color: var(--red); }
    .log-bad_syntax .log-type { color: var(--yellow); }
    .log-detail { color: var(--text-muted); flex: 1; }
    .log-time { color: var(--text-faint); font-size: 0.7rem; flex-shrink: 0; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>🦞 llm-collab <span>dashboard</span></h1>
      <div class="controls">
        <div class="theme-switcher">
          <button class="theme-btn active" data-theme="dark">Dark</button>
          <button class="theme-btn" data-theme="light">Light</button>
          <button class="theme-btn" data-theme="solarized">Solar</button>
        </div>
        <div class="poll-indicator">
          <span class="poll-dot" id="poll-dot"></span>
          <span id="poll-text">Connecting…</span>
        </div>
      </div>
    </header>
    <div id="loading">Loading project data…</div>
    <div id="dashboard" style="display:none">
      <div class="section" id="agents-section">
        <div class="section-header" onclick="toggleSection('agents-section')"><span class="section-title"><span class="collapse-icon">▼</span>Agents <span class="collapsed-count" id="agent-collapsed-count"></span></span></div>
        <div class="section-body"><div class="agents" id="agents"></div></div>
      </div>
      <div class="section" id="inbox-log-section" style="display:none">
        <div class="section-header" onclick="toggleSection('inbox-log-section')"><span class="section-title"><span class="collapse-icon">▼</span>Inbox Log <span id="log-count"></span></span></div>
        <div class="section-body"><div class="log-list" id="inbox-log"></div></div>
      </div>
      <div class="section" id="messages-section" style="display:none">
        <div class="section-header" onclick="toggleSection('messages-section')"><span class="section-title"><span class="collapse-icon">▼</span>Messages <span class="msg-count-btn" id="msg-count" onclick="event.stopPropagation();toggleMsgFilter()"></span></span></div>
        <div class="section-body"><div class="msg-list" id="messages"></div></div>
      </div>
      <div class="progress-section">
        <div class="progress-header">
          <span class="progress-pct" id="progress-pct">0%</span>
          <span class="progress-label" id="progress-label">0/0 tasks</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <div class="stats" id="stats"></div>
      <div class="section" id="tasks-section">
        <div class="section-header" onclick="toggleSection('tasks-section')"><span class="section-title"><span class="collapse-icon">▼</span>Tasks <span class="collapsed-count" id="task-collapsed-count"></span></span><span class="section-count" id="task-count"></span></div>
        <div class="section-body"><div class="task-list" id="tasks"></div></div>
      </div>
      <footer class="footer" id="footer"></footer>
    </div>
    <div id="error" style="display:none" class="error"></div>
  </div>
  <script>
    const POLL_INTERVALS=[{ms:5000,label:'5s'},{ms:10000,label:'10s'},{ms:30000,label:'30s'},{ms:60000,label:'1m'},{ms:120000,label:'2m'},{ms:300000,label:'5m'}];
    const DEFAULT_POLL_MS=30000,PLAN_URL='plan.json',AGENT_COLORS=['#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#06b6d4','#84cc16'];
    let pollIntervalMs=parseInt(localStorage.getItem('poll-interval'))||DEFAULT_POLL_MS;
    let msgFilterUnread=false;
    let previousPlan=null,pollTimer=null,activeFilters=new Set(),activeAgentFilters=new Set(),currentTasks=[];
    function toggleSection(id){const sec=document.getElementById(id);sec.classList.toggle('collapsed');const key='collapsed-'+id;if(sec.classList.contains('collapsed')){localStorage.setItem(key,'1')}else{localStorage.removeItem(key)}updateCollapsedCounts()}
    function restoreCollapseState(){['agents-section','messages-section','inbox-log-section','tasks-section'].forEach(id=>{if(localStorage.getItem('collapsed-'+id)==='1'){const el=document.getElementById(id);if(el)el.classList.add('collapsed')}})}
    function updateCollapsedCounts(){const sec=document.getElementById('agents-section');const el=document.getElementById('agent-collapsed-count');if(sec&&el){const cards=document.querySelectorAll('#agents .agent-card');el.textContent=sec.classList.contains('collapsed')?'('+cards.length+')':''}const tsec=document.getElementById('tasks-section');const tel=document.getElementById('task-collapsed-count');if(tsec&&tel){const shown=document.querySelectorAll('.task[data-task-id]:not(.filtered-out)').length;tel.textContent=tsec.classList.contains('collapsed')?'('+shown+')':''}}
    restoreCollapseState();
    function agentColor(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return AGENT_COLORS[Math.abs(h)%AGENT_COLORS.length]}
    function agentInitial(n){return n.split('-').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
    function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('dashboard-theme',t);document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===t))}
    document.querySelectorAll('.theme-btn').forEach(b=>b.addEventListener('click',()=>setTheme(b.dataset.theme)));
    const saved=localStorage.getItem('dashboard-theme');if(saved)setTheme(saved);
    function diffTasks(o,n){const m=new Map(o.map(t=>[t.id,t])),a=[],c=[];for(const t of n){if(!m.has(t.id)){a.push(t.id)}else{const p=m.get(t.id);if(p.status!==t.status||p.assignee!==t.assignee||p.result!==t.result)c.push({id:t.id,statusChanged:p.status!==t.status,assigneeChanged:p.assignee!==t.assignee})}}return{added:a,changed:c}}
    function diffCounts(o,n){const c=(t,s)=>t.filter(x=>x.status===s).length,r={};for(const s of['done','in_progress','pending','blocked'])if(c(o,s)!==c(n,s))r[s]=true;return r}
    function setPollStatus(t,f){document.getElementById('poll-text').textContent=t;document.getElementById('poll-dot').classList.toggle('fetching',!!f)}
    async function fetchPlan(){setPollStatus('Checking…',true);try{const r=await fetch(PLAN_URL+'?_='+Date.now());if(!r.ok)throw new Error('HTTP '+r.status);const p=await r.json(),tasks=p.tasks||[];let diff=null,cc={};if(previousPlan){const o=previousPlan.tasks||[];diff=diffTasks(o,tasks);cc=diffCounts(o,tasks);if(!diff.added.length&&!diff.changed.length){setPollStatus('Live · '+new Date().toLocaleTimeString(),false);return}}renderDashboard(p,diff,cc);previousPlan=p;setPollStatus('Updated · '+new Date().toLocaleTimeString(),false)}catch(e){setPollStatus('Error · retrying…',false)}}
    function renderDashboard(plan,diff,cc){const tasks=plan.tasks||[],counts={done:0,in_progress:0,pending:0,blocked:0,on_hold:0,backlog:0,skipped:0};tasks.forEach(t=>counts[t.status]=(counts[t.status]||0)+1);const total=tasks.length,pct=total?Math.round(counts.done/total*100):0;document.getElementById('loading').style.display='none';document.getElementById('dashboard').style.display='block';document.getElementById('progress-pct').textContent=pct+'%';document.getElementById('progress-label').textContent=counts.done+' of '+total+' tasks complete';document.getElementById('progress-fill').style.width=pct+'%';renderStats(counts,cc);renderAgents(tasks,diff);renderTasks(tasks,diff);currentTasks=tasks;const assignees=[...new Set(tasks.map(t=>t.assignee).filter(Boolean))];updateTaskCount();updateCollapsedCounts();if(plan.updated_at){const f=document.getElementById('footer');const opts=POLL_INTERVALS.map(p=>'<option value="'+p.ms+'"'+(p.ms===pollIntervalMs?' selected':'')+'>'+p.label+'</option>').join('');f.innerHTML='Last plan update: '+new Date(plan.updated_at).toLocaleString()+' · Auto-refresh every <select id="poll-select">'+opts+'</select>';document.getElementById('poll-select').onchange=function(){pollIntervalMs=parseInt(this.value);localStorage.setItem('poll-interval',pollIntervalMs);if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(fetchAll,pollIntervalMs)}}}
    function renderStats(counts,cc){const el=document.getElementById('stats');const items=[{cls:'done',key:'done',icon:'✓',val:counts.done,label:'Done'},{cls:'progress',key:'in_progress',icon:'◉',val:counts.in_progress,label:'In Progress'},{cls:'pending',key:'pending',icon:'○',val:counts.pending,label:'Pending'},{cls:'blocked',key:'blocked',icon:'⊘',val:counts.blocked,label:'Blocked'},{cls:'on-hold',key:'on_hold',icon:'⏸',val:counts.on_hold,label:'On Hold'},{cls:'backlog',key:'backlog',icon:'☰',val:counts.backlog,label:'Backlog'}];el.innerHTML=items.map(s=>{const ch=cc[s.key]?' changed':'',vc=cc[s.key]?' count-changed':'',fc=activeFilters.has(s.key)?' filter-active':'',ec=s.val===0&&!activeFilters.has(s.key)?' empty':'';return'<div class="stat stat-'+s.cls+ch+fc+ec+'" data-status="'+s.key+'"><div class="stat-icon">'+s.icon+'</div><div class="stat-value'+vc+'">'+s.val+'</div><div class="stat-label">'+s.label+'</div></div>'}).join('');el.querySelectorAll('.stat').forEach(s=>s.addEventListener('click',()=>{const st=s.dataset.status;if(activeFilters.has(st)){activeFilters.delete(st);s.classList.remove('filter-active');if(parseInt(s.querySelector('.stat-value').textContent)===0)s.classList.add('empty')}else{activeFilters.add(st);s.classList.add('filter-active');s.classList.remove('empty')}applyFilters()}));if(Object.keys(cc).length)setTimeout(()=>el.querySelectorAll('.stat.changed').forEach(s=>s.classList.remove('changed')),600)}
    function renderAgents(tasks,diff){const el=document.getElementById('agents'),assignees=[...new Set(tasks.map(t=>t.assignee).filter(Boolean))],oldA=previousPlan?[...new Set((previousPlan.tasks||[]).map(t=>t.assignee).filter(Boolean))]:[],newA=new Set(assignees.filter(a=>!oldA.includes(a)));el.innerHTML=assignees.map(id=>{const at=tasks.filter(t=>t.assignee===id),done=at.filter(t=>t.status==='done').length,ip=at.filter(t=>t.status==='in_progress').length,isNew=newA.has(id),oldD=previousPlan?(previousPlan.tasks||[]).filter(t=>t.assignee===id&&t.status==='done').length:done,ac=isNew?' new-agent':(diff&&done!==oldD?' changed':''),fc=activeAgentFilters.has(id)?' filter-active':'',col=agentColor(id);return'<div class="agent-card'+ac+fc+'" data-agent="'+id+'"><div class="agent-top"><div class="agent-avatar" style="background:'+col+'">'+agentInitial(id)+'</div><div class="agent-name">'+id+'</div></div><div class="agent-stats"><span class="agent-stat"><span class="mini-dot done"></span>'+done+' done</span>'+(ip?'<span class="agent-stat"><span class="mini-dot active"></span>'+ip+' active</span>':'')+'<span class="agent-stat" style="color:var(--text-faint)">'+at.length+' total</span></div></div>'}).join('');el.querySelectorAll('.agent-card').forEach(c=>c.addEventListener('click',()=>{const id=c.dataset.agent;activeAgentFilters.has(id)?activeAgentFilters.delete(id):activeAgentFilters.add(id);c.classList.toggle('filter-active');applyFilters()}))}
    function renderTasks(tasks,diff){const el=document.getElementById('tasks'),so={in_progress:0,pending:1,blocked:2,on_hold:3,backlog:4,done:5,skipped:6},ix=tasks.map((t,i)=>({...t,_idx:i})),sorted=ix.sort((a,b)=>{const d=(so[a.status]??7)-(so[b.status]??7);return d!==0?d:b._idx-a._idx}),addS=new Set(diff?diff.added:[]),chM=new Map(diff?diff.changed.map(c=>[c.id,c]):[]);el.innerHTML=sorted.map(t=>{const isN=addS.has(t.id),ch=chM.get(t.id),tc=isN?' new-task':(ch?' changed-task':''),bc=ch&&ch.statusChanged?' status-changed':'',ac=ch&&ch.assigneeChanged?' assignee-changed':'',hd=t.result||t.description||t.notes;return'<div class="task'+tc+'" data-task-id="'+t.id+'"'+(hd?' data-expandable':'')+'><div class="task-row"><span class="badge badge-'+t.status+bc+'">'+t.status.replace('_',' ')+'</span><span class="task-title">'+t.title+'</span>'+(t.assignee?'<span class="task-assignee'+ac+'">'+t.assignee+'</span>':'')+(hd?'<span class="task-chevron">▸</span>':'')+'</div>'+(hd?'<div class="task-detail">'+(t.result?'<strong>Result:</strong> '+t.result:'')+(t.notes?'<strong>Notes:</strong> '+t.notes:'')+(t.description&&!t.result&&!t.notes?t.description:'')+'</div>':'')+'</div>'}).join('');el.querySelectorAll('.task[data-expandable]').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('expanded')));applyFilters()}
    function updateTaskCount(){const v=document.querySelectorAll('.task[data-task-id]:not(.filtered-out)').length;document.getElementById('task-count').textContent=v+' shown'}
    function applyFilters(){document.querySelectorAll('.task[data-task-id]').forEach(el=>{const t=currentTasks.find(x=>x.id===el.dataset.taskId);if(!t)return;const sOk=!activeFilters.size||activeFilters.has(t.status),aOk=!activeAgentFilters.size||activeAgentFilters.has(t.assignee||'');el.classList.toggle('filtered-out',!(sOk&&aOk))});updateTaskCount()}

    async function fetchMessages(){
      try{
        const r=await fetch('messages.json?_='+Date.now());
        if(!r.ok)return;
        const data=await r.json();
        const allMsgs=(data.messages||[]).filter(m=>!m.retracted).slice().reverse();
        const sec=document.getElementById('messages-section');
        const el=document.getElementById('messages');
        if(!allMsgs.length){sec.style.display='none';return}
        sec.style.display='block';
        const agents=currentTasks.length?[...new Set(currentTasks.map(t=>t.assignee).filter(Boolean))]:[];
        function isMsgRead(m){
          if(m.to==='all'){const rb=m.read_by||[];return!!m.read||(agents.length>0&&agents.every(a=>rb.includes(a)))}
          return!!m.read;
        }
        const unread=allMsgs.filter(m=>!isMsgRead(m)).length;
        const countEl=document.getElementById('msg-count');
        countEl.textContent=(unread||msgFilterUnread)?'('+unread+')':'';
        countEl.classList.toggle('active',msgFilterUnread);
        const msgs=msgFilterUnread?allMsgs.filter(m=>!isMsgRead(m)):allMsgs;
        el.innerHTML=msgs.slice(0,20).map(m=>{
          const ts=m.timestamp?new Date(m.timestamp).toLocaleString():'';
          const cls=isMsgRead(m)?'':'unread';
          let toLabel='→ '+m.to;
          if(m.to==='all'){const rb=m.read_by||[];if(rb.length>0){const senderIsAgent=agents.includes(m.from);const total=senderIsAgent?agents.length-1:agents.length;const who=rb.length===1?'only '+rb[0]:rb.join(', ');toLabel='→ all <span class="msg-read-status" title="Read by: '+who+'">('+ rb.length+'/'+total+')</span>'}}
          return'<div class="msg-item '+cls+'"><div class="msg-meta"><span class="msg-from">'+m.from+'</span><span class="msg-to">'+toLabel+'</span><span class="msg-time">'+ts+'</span></div><div class="msg-content">'+marked.parse(m.content||'')+'</div></div>'
        }).join('');
        if(msgFilterUnread&&!msgs.length)el.innerHTML='<div style="color:var(--text-faint);text-align:center;padding:1rem">No unread messages</div>';
      }catch(e){}
    }
    function toggleMsgFilter(){msgFilterUnread=!msgFilterUnread;fetchMessages()}

    async function fetchInboxLog(){
      try{
        const r=await fetch('inbox-log.json?_='+Date.now());
        if(!r.ok)return;
        const data=await r.json();
        const entries=(data.entries||[]).filter(e=>e.type!=='delivered'&&!e.read).slice().reverse();
        const sec=document.getElementById('inbox-log-section');
        const el=document.getElementById('inbox-log');
        if(!entries.length){sec.style.display='none';return}
        sec.style.display='block';
        document.getElementById('log-count').textContent='('+entries.length+')';
        el.innerHTML=entries.slice(0,30).map(e=>{
          const ts=e.timestamp?new Date(e.timestamp).toLocaleString():'';
          const label=e.type==='delivered'?'delivered':e.type==='unauthorized'?'unauth\'d':'bad syntax';
          return'<div class="log-entry log-'+e.type+'"><span class="log-type">'+label+'</span><span class="log-detail">'+e.detail+'</span><span class="log-time">'+ts+'</span></div>'
        }).join('');
      }catch(e){}
    }

    async function fetchAll(){await fetchPlan();await fetchMessages();await fetchInboxLog()}
    fetchAll().then(()=>{pollTimer=setInterval(fetchAll,pollIntervalMs)});
  </script>
