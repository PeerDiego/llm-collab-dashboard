<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>llm-collab Dashboard</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #c9d1d9; --text-muted: #8b949e; --text-faint: #484f58;
      --heading: #e6edf3; --accent: #bc8cff; --accent-glow: rgba(188,140,255,0.5);
      --green: #3fb950; --yellow: #d29922; --red: #f85149;
      --badge-pending-bg: #30363d; --badge-pending-fg: #8b949e;
    }
    :root[data-theme="light"] {
      --bg: #ffffff; --surface: #f6f8fa; --border: #d0d7de;
      --text: #1f2328; --text-muted: #656d76; --text-faint: #8b949e;
      --heading: #1f2328; --accent: #8250df; --accent-glow: rgba(130,80,223,0.4);
      --green: #1a7f37; --yellow: #9a6700; --red: #cf222e;
      --badge-pending-bg: #eaeef2; --badge-pending-fg: #656d76;
    }
    :root[data-theme="solarized"] {
      --bg: #002b36; --surface: #073642; --border: #586e75;
      --text: #839496; --text-muted: #657b83; --text-faint: #586e75;
      --heading: #93a1a1; --accent: #d33682; --accent-glow: rgba(211,54,130,0.4);
      --green: #859900; --yellow: #b58900; --red: #dc322f;
      --badge-pending-bg: #073642; --badge-pending-fg: #657b83;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; transition: background 0.3s, color 0.3s; }
    h1 { color: var(--heading); margin-bottom: 0.5rem; }
    .header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }
    .top-bar { position: fixed; top: 2rem; right: 2rem; display: flex; align-items: center; gap: 1.5rem; z-index: 10; }
    .poll-status { color: var(--text-faint); font-size: 0.75rem; }
    .poll-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 0.4rem; vertical-align: middle; }
    .poll-dot.fetching { background: var(--yellow); animation: pulse-dot 0.6s ease-in-out infinite; }
    .theme-switcher { display: flex; gap: 0.25rem; }
    .theme-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); font-size: 0.7rem; padding: 0.25rem 0.5rem; cursor: pointer; transition: all 0.2s; }
    .theme-btn:hover { border-color: var(--accent); color: var(--text); }
    .theme-btn.active { border-color: var(--accent); color: var(--accent); background: var(--bg); }

    .stats { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.5rem; min-width: 120px; transition: border-color 0.3s, transform 0.3s, background 0.3s; cursor: pointer; user-select: none; }
    .stat:hover { border-color: var(--accent); }
    .stat.changed { border-color: var(--accent); transform: scale(1.05); }
    .stat.filter-active { border-color: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
    .stat-value { font-size: 2rem; font-weight: bold; transition: color 0.3s; }
    .stat-label { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem; }
    .stat-done .stat-value { color: var(--green); }
    .stat-progress .stat-value { color: var(--yellow); }
    .stat-pending .stat-value { color: var(--text-muted); }
    .stat-blocked .stat-value { color: var(--red); }
    .section { margin-bottom: 2rem; }
    .section h2 { color: var(--text); font-size: 1.1rem; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .task { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem; transition: all 0.4s ease; max-height: 200px; opacity: 1; overflow: hidden; }
    .task.filtered-out { max-height: 0; opacity: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; border-width: 0; }
    .task:hover { border-color: var(--accent); }
    .task.new-task { animation: slideIn 0.6s ease-out; }
    .task.changed-task { animation: flashBorder 1s ease-out; }
    .badge { font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 12px; font-weight: 600; white-space: nowrap; transition: all 0.3s; }
    .badge-done { background: #238636; color: #fff; }
    .badge-in_progress { background: #9e6a03; color: #fff; }
    .badge-pending { background: var(--badge-pending-bg); color: var(--badge-pending-fg); }
    .badge-blocked { background: #da3633; color: #fff; }
    .badge-skipped { background: var(--badge-pending-bg); color: var(--badge-pending-fg); }
    .badge.status-changed { animation: popBadge 0.5s ease-out; }
    .task-title { flex: 1; font-weight: 500; }
    .task-assignee { color: var(--accent); font-size: 0.85rem; white-space: nowrap; transition: all 0.3s; }
    .task-assignee.assignee-changed { animation: glowText 1s ease-out; }
    .task-result { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.25rem; }
    .agents { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .agent-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; min-width: 200px; flex: 1; transition: all 0.4s; cursor: pointer; user-select: none; }
    .agent-card:hover { border-color: var(--accent); }
    .agent-card.new-agent { animation: slideIn 0.6s ease-out; }
    .agent-card.changed { animation: flashBorder 1s ease-out; }
    .agent-card.filter-active { border-color: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
    .agent-name { color: var(--accent); font-weight: 600; margin-bottom: 0.5rem; }
    .agent-detail { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }
    .progress-bar { background: var(--border); border-radius: 4px; height: 8px; margin-top: 1rem; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.8s ease-in-out; }
    .updated { color: var(--text-muted); font-size: 0.8rem; margin-top: 1rem; text-align: center; }
    .error { color: var(--red); text-align: center; padding: 2rem; }
    #loading { text-align: center; padding: 2rem; color: var(--text-muted); }

    @keyframes slideIn {
      0% { opacity: 0; max-height: 0; transform: translateY(-10px); margin-bottom: 0; padding: 0 1rem; }
      50% { opacity: 0.5; }
      100% { opacity: 1; max-height: 200px; transform: translateY(0); margin-bottom: 0.5rem; padding: 0.75rem 1rem; }
    }
    @keyframes flashBorder {
      0% { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
      100% { border-color: var(--border); box-shadow: none; }
    }
    @keyframes popBadge {
      0% { transform: scale(1); }
      40% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @keyframes glowText {
      0% { color: #fff; text-shadow: 0 0 8px var(--accent-glow); }
      100% { color: var(--accent); text-shadow: none; }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes countUp {
      0% { transform: translateY(100%); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .stat-value.count-changed {
      display: inline-block;
      animation: countUp 0.4s ease-out;
    }
  </style>
</head>
<body>
  <div class="header"><h1>🦞 llm-collab Dashboard</h1></div>
  <p class="subtitle">Multi-agent coordination project</p>
  <div class="top-bar">
    <div class="theme-switcher">
      <button class="theme-btn active" data-theme="dark">Dark</button>
      <button class="theme-btn" data-theme="light">Light</button>
      <button class="theme-btn" data-theme="solarized">Solarized</button>
    </div>
    <p class="poll-status"><span class="poll-dot" id="poll-dot"></span><span id="poll-text">Connecting...</span></p>
  </div>
  <div id="loading">Loading plan.json...</div>
  <div id="dashboard" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <p id="progress-text" style="color:var(--text-muted);font-size:0.85rem;margin:0.5rem 0 1.5rem"></p>
    <div class="stats" id="stats"></div>
    <div class="section"><h2>Agents</h2><div class="agents" id="agents"></div></div>
    <div class="section"><h2>Tasks</h2><div id="tasks"></div></div>
    <p class="updated" id="updated"></p>
  </div>
  <div id="error" style="display:none" class="error"></div>

  <script>
    const POLL_INTERVAL_MS = 30000;
    const PLAN_URL = '../plan.json';

    let previousPlan = null;
    let pollTimer = null;
    let activeFilters = new Set();
    let activeAgentFilters = new Set();
    let currentTasks = [];

    // Theme switcher
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('dashboard-theme', theme);
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === theme);
      });
    }

    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => setTheme(btn.dataset.theme));
    });

    const savedTheme = localStorage.getItem('dashboard-theme');
    if (savedTheme) setTheme(savedTheme);

    function taskKey(t) { return t.id; }

    function diffTasks(oldTasks, newTasks) {
      const oldMap = new Map(oldTasks.map(t => [taskKey(t), t]));
      const newMap = new Map(newTasks.map(t => [taskKey(t), t]));
      const added = [];
      const changed = [];
      for (const [id, task] of newMap) {
        if (!oldMap.has(id)) {
          added.push(id);
        } else {
          const old = oldMap.get(id);
          if (old.status !== task.status || old.assignee !== task.assignee || old.result !== task.result) {
            changed.push({ id, statusChanged: old.status !== task.status, assigneeChanged: old.assignee !== task.assignee });
          }
        }
      }
      return { added, changed };
    }

    function diffCounts(oldTasks, newTasks) {
      const count = (tasks, s) => tasks.filter(t => t.status === s).length;
      const statuses = ['done', 'in_progress', 'pending', 'blocked'];
      const changes = {};
      for (const s of statuses) {
        if (count(oldTasks, s) !== count(newTasks, s)) changes[s] = true;
      }
      return changes;
    }

    function setPollStatus(text, fetching) {
      document.getElementById('poll-text').textContent = text;
      const dot = document.getElementById('poll-dot');
      dot.classList.toggle('fetching', !!fetching);
    }

    async function fetchPlan() {
      setPollStatus('Checking for updates...', true);
      try {
        const res = await fetch(PLAN_URL + '?_=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const plan = await res.json();
        const tasks = plan.tasks || [];

        let diff = null;
        let countChanges = {};
        if (previousPlan) {
          const oldTasks = previousPlan.tasks || [];
          diff = diffTasks(oldTasks, tasks);
          countChanges = diffCounts(oldTasks, tasks);
          if (diff.added.length === 0 && diff.changed.length === 0) {
            setPollStatus(`Live · No changes · Last checked ${new Date().toLocaleTimeString()}`, false);
            return;
          }
        }

        renderDashboard(plan, diff, countChanges);
        previousPlan = plan;
        setPollStatus(`Live · Updated ${new Date().toLocaleTimeString()}`, false);
      } catch (e) {
        setPollStatus(`Error: ${e.message} · Retrying...`, false);
        console.error('Poll error:', e);
      }
    }

    function renderDashboard(plan, diff, countChanges) {
      const tasks = plan.tasks || [];
      const counts = { done: 0, in_progress: 0, pending: 0, blocked: 0, skipped: 0 };
      tasks.forEach(t => { counts[t.status] = (counts[t.status] || 0) + 1; });
      const total = tasks.length;
      const pct = total ? Math.round((counts.done / total) * 100) : 0;

      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('progress').style.width = pct + '%';
      document.getElementById('progress-text').textContent = `${pct}% complete (${counts.done}/${total} tasks)`;

      const statsEl = document.getElementById('stats');
      const statItems = [
        { cls: 'done', key: 'done', val: counts.done, label: 'Done' },
        { cls: 'progress', key: 'in_progress', val: counts.in_progress, label: 'In Progress' },
        { cls: 'pending', key: 'pending', val: counts.pending, label: 'Pending' },
        { cls: 'blocked', key: 'blocked', val: counts.blocked, label: 'Blocked' },
      ];
      statsEl.innerHTML = statItems.map(s => {
        const changedCls = countChanges && countChanges[s.key] ? ' changed' : '';
        const valCls = countChanges && countChanges[s.key] ? ' count-changed' : '';
        const filterCls = activeFilters.has(s.key) ? ' filter-active' : '';
        return `<div class="stat stat-${s.cls}${changedCls}${filterCls}" data-status="${s.key}"><div class="stat-value${valCls}">${s.val}</div><div class="stat-label">${s.label}</div></div>`;
      }).join('');

      statsEl.querySelectorAll('.stat').forEach(el => {
        el.addEventListener('click', () => {
          const status = el.dataset.status;
          if (activeFilters.has(status)) {
            activeFilters.delete(status);
            el.classList.remove('filter-active');
          } else {
            activeFilters.add(status);
            el.classList.add('filter-active');
          }
          applyFilters();
        });
      });

      if (countChanges) {
        setTimeout(() => {
          document.querySelectorAll('.stat.changed').forEach(el => el.classList.remove('changed'));
        }, 1000);
      }

      renderAgentsFromPlan(tasks, diff);
      renderTasks(tasks, diff);
      currentTasks = tasks;

      if (plan.updated_at) {
        document.getElementById('updated').textContent = `Plan last updated: ${new Date(plan.updated_at).toLocaleString()}`;
      }
    }

    function renderTasks(tasks, diff) {
      const tasksEl = document.getElementById('tasks');
      const statusOrder = { in_progress: 0, pending: 1, blocked: 2, done: 3, skipped: 4 };
      const indexed = tasks.map((t, i) => ({ ...t, _idx: i }));
      const sorted = indexed.sort((a, b) => {
        const statusDiff = (statusOrder[a.status] ?? 5) - (statusOrder[b.status] ?? 5);
        if (statusDiff !== 0) return statusDiff;
        return b._idx - a._idx;
      });

      const addedSet = new Set(diff ? diff.added : []);
      const changedMap = new Map(diff ? diff.changed.map(c => [c.id, c]) : []);

      tasksEl.innerHTML = sorted.map(t => {
        const isNew = addedSet.has(t.id);
        const change = changedMap.get(t.id);
        const taskCls = isNew ? ' new-task' : (change ? ' changed-task' : '');
        const badgeCls = change && change.statusChanged ? ' status-changed' : '';
        const assigneeCls = change && change.assigneeChanged ? ' assignee-changed' : '';

        return `
          <div class="task${taskCls}" data-task-id="${t.id}">
            <span class="badge badge-${t.status}${badgeCls}">${t.status.replace('_', ' ')}</span>
            <span class="task-title">
              ${t.title}
              ${t.result ? `<div class="task-result">${t.result}</div>` : ''}
            </span>
            ${t.assignee ? `<span class="task-assignee${assigneeCls}">${t.assignee}</span>` : ''}
          </div>
        `;
      }).join('');
    }

    function renderAgentsFromPlan(tasks, diff) {
      const el = document.getElementById('agents');
      const assignees = [...new Set(tasks.map(t => t.assignee).filter(Boolean))];

      const oldAssignees = previousPlan
        ? [...new Set((previousPlan.tasks || []).map(t => t.assignee).filter(Boolean))]
        : [];
      const newAgents = new Set(assignees.filter(a => !oldAssignees.includes(a)));

      el.innerHTML = assignees.map(id => {
        const agentTasks = tasks.filter(t => t.assignee === id);
        const done = agentTasks.filter(t => t.status === 'done').length;
        const inProg = agentTasks.filter(t => t.status === 'in_progress').length;
        const isNew = newAgents.has(id);

        const oldDone = previousPlan
          ? (previousPlan.tasks || []).filter(t => t.assignee === id && t.status === 'done').length
          : done;
        const hasChange = diff && done !== oldDone;
        const animCls = isNew ? ' new-agent' : (hasChange ? ' changed' : '');
        const filterCls = activeAgentFilters.has(id) ? ' filter-active' : '';

        return `<div class="agent-card${animCls}${filterCls}" data-agent="${id}">
          <div class="agent-name">${id}</div>
          <div class="agent-detail">${done}/${agentTasks.length} tasks done${inProg ? ` · ${inProg} in progress` : ''}</div>
        </div>`;
      }).join('');

      el.querySelectorAll('.agent-card').forEach(card => {
        card.addEventListener('click', () => {
          const agentId = card.dataset.agent;
          if (activeAgentFilters.has(agentId)) {
            activeAgentFilters.delete(agentId);
            card.classList.remove('filter-active');
          } else {
            activeAgentFilters.add(agentId);
            card.classList.add('filter-active');
          }
          applyFilters();
        });
      });
    }

    function applyFilters() {
      const taskEls = document.querySelectorAll('.task[data-task-id]');
      taskEls.forEach(el => {
        const taskId = el.dataset.taskId;
        const task = currentTasks.find(t => t.id === taskId);
        if (!task) return;
        const statusMatch = activeFilters.size === 0 || activeFilters.has(task.status);
        const agentMatch = activeAgentFilters.size === 0 || activeAgentFilters.has(task.assignee || '');
        el.classList.toggle('filtered-out', !(statusMatch && agentMatch));
      });
    }

    // Initial load
    fetchPlan().then(() => {
      pollTimer = setInterval(fetchPlan, POLL_INTERVAL_MS);
    });
  </script>
</body>
</html>
